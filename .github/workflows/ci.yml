name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd python-api
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 python-api --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Check Flask app starts
      run: |
        cd python-api
        timeout 10 python app.py || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Lint
      run: |
        cd frontend
        npm run lint || true
    
    - name: Build
      run: |
        cd frontend
        npm run build
    
    - name: Check build artifacts
      run: |
        ls -la frontend/dist

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for secrets
      run: |
        echo "Checking for potential secrets..."
        ! grep -r "api_key\|password\|secret" --include="*.py" --include="*.ts" --include="*.tsx" python-api/ frontend/src/ || true
    
    - name: Check file sizes
      run: |
        echo "Checking for large files..."
        find . -type f -size +10M -not -path "./.git/*" -not -path "./node_modules/*"
